name: CI/CD Mercadinho

on:
  push:
    branches: [ "main", "marcus" ]
  pull_request:

jobs:

  # ==========================================
  # 🧪 TESTES
  # ==========================================
  test:
    name: Executar Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar testes
        run: |
          echo "Executando testes..."
          PYTHONPATH=. pytest --html=report.html --self-contained-html

      - name: Salvar relatório de testes
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: report.html

  # ==========================================
  # 🧹 LINT (RODA EM PARALELO COM TEST)
  # ==========================================
  lint:
    name: Análise de Código (Lint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Instalar flake8
        run: pip install flake8

      - name: Rodar lint
        run: flake8 . --exclude=venv,__pycache__ --max-line-length=120 || true

  # ==========================================
  # 📦 BUILD
  # ==========================================
  build:
    name: Build do Projeto
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Criar pacote do projeto
        run: |
          echo "Gerando pacote..."
          zip -r projeto.zip . --exclude "venv/*" --exclude ".git/*" --exclude ".coverage" --exclude "report.html" --exclude ".pytest_cache/*" --exclude "__pycache__/*"

      - name: Salvar artefato do build
        uses: actions/upload-artifact@v4
        with:
          name: build-projeto
          path: projeto.zip

  # ==========================================
  # 🚀 DEPLOY
  # ==========================================
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Baixar artefato do build
        uses: actions/download-artifact@v4
        with:
          name: build-projeto

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: projeto.zip
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: "Pacote gerado pelo pipeline de CI/CD."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # 📢 NOTIFICAÇÃO
  # ==========================================
  notify:
    name: Notificação Final
    needs: [test, build, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Enviar Notificação
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          STATUS_TEST: ${{ needs.test.result }}
          STATUS_BUILD: ${{ needs.build.result }}
          STATUS_DEPLOY: ${{ needs.deploy.result }}
        run: python send_notification.py